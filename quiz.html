<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

#timer{
font-size:24px;
font-weight:bold;
color:red;
margin-bottom:15px;
}

#palette{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:20px;
}

.palette-btn{
width:40px;
height:40px;
border:none;
border-radius:8px;
cursor:pointer;
background:#e5e7eb;
}

.palette-active{
background:#2563eb;
color:white;
}

.palette-answered{
background:#22c55e;
color:white;
}

button{
width:100%;
padding:12px;
margin:5px 0;
cursor:pointer;
border:none;
border-radius:8px;
}

.selected{
background:#93c5fd;
}

.next{
background:#2563eb;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>🚂 RRB Group D Test</h1>

<div id="timer">60</div>

<div id="palette"></div>

<h3 id="question">Loading...</h3>

<div id="options"></div>

<button onclick="prevQuestion()">Previous</button>

<button class="next" onclick="nextQuestion()">Next</button>

<button onclick="confirmSubmit()">Submit Test</button>

</div>

<script>

let questions=[];
let current=0;
let userAnswers=[];

const params = new URLSearchParams(window.location.search);
const test = params.get("test") || "rrb-groupd-01";

fetch(`data/${test}.json`)
.then(response=>response.json())
.then(data=>{
questions=data;
buildPalette();
loadQuestion();
});

function loadQuestion(){

document.getElementById("question").innerHTML=
`Q${current+1}. ${questions[current].question}`;

let html="";

questions[current].options.forEach((opt,index)=>{

html+=`
<button onclick="selectAnswer(${index})">
${opt}
</button>
`;

});

document.getElementById("options").innerHTML=html;

let buttons=document.querySelectorAll("#options button");

if(userAnswers[current]!==undefined){
buttons[userAnswers[current]]
.classList.add("selected");
}

buildPalette();
  
let nextBtn=document.querySelector(".next");

if(current===questions.length-1){
nextBtn.innerHTML="Finish Test";
}else{
nextBtn.innerHTML="Next";
}
}

function selectAnswer(index){

userAnswers[current]=index;

let buttons=document.querySelectorAll("#options button");

buttons.forEach(btn=>btn.classList.remove("selected"));

buttons[index].classList.add("selected");

buildPalette();
}

function buildPalette(){

let html="";

for(let i=0;i<questions.length;i++){

let cls="palette-btn";

if(userAnswers[i]!==undefined){
cls+=" palette-answered";
}

if(i===current){
cls+=" palette-active";
}

html+=`
<button class="${cls}"
onclick="goQuestion(${i})">
${i+1}
</button>
`;

}

document.getElementById("palette").innerHTML=html;
}

function goQuestion(index){

current=index;
loadQuestion();

}

function prevQuestion(){

if(current>0){
current--;
loadQuestion();
}

}

function nextQuestion(){

current++;

if(current>=questions.length){
finishQuiz();
return;
}

loadQuestion();
}

function confirmSubmit(){

let ok=confirm("क्या आप टेस्ट समाप्त करना चाहते हैं?");

if(ok){
finishQuiz();
}

}  
function finishQuiz(){

let score=0;
let attempted=0;

for(let i=0;i<questions.length;i++){

if(userAnswers[i]!==undefined){
attempted++;
}

if(userAnswers[i]===questions[i].answer){
score++;
}

}

let wrong=attempted-score;
let unattempted=questions.length-attempted;
let percentage=((score/questions.length)*100).toFixed(2);

localStorage.setItem("score",score);
localStorage.setItem("total",questions.length);
localStorage.setItem("wrong",wrong);
localStorage.setItem("unattempted",unattempted);
localStorage.setItem("percentage",percentage);

window.location="result.html";
}

let time=1800;

const timer=setInterval(()=>{

time--;

document.getElementById("timer").innerHTML=
"⏱️ "+time;

if(time<=0){

clearInterval(timer);

finishQuiz();

}

},1000);

</script>

</body>
</html>
