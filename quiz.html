<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

#timer{
font-size:24px;
font-weight:bold;
color:red;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
margin:5px 0;
cursor:pointer;
}

.selected{
background:#93c5fd;
}

.next{
background:#2563eb;
color:white;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>🚂 RRB Group D Test</h1>

<div id="timer">60</div>

<h3 id="question">Loading...</h3>

<div id="options"></div>

<button class="next" onclick="nextQuestion()">Next</button>

</div>

<script>

let questions=[];
let current=0;
let userAnswers=[];

const params = new URLSearchParams(window.location.search);
const test = params.get("test") || "rrb-groupd-01";

fetch(`data/${test}.json`)
.then(response=>response.json())
.then(data=>{
questions=data;
loadQuestion();
});

function loadQuestion(){

document.getElementById("question").innerHTML=
`Q${current+1}. ${questions[current].question}`;

let html="";

questions[current].options.forEach((opt,index)=>{

html+=`
<button onclick="selectAnswer(${index})">
${opt}
</button>
`;

});

document.getElementById("options").innerHTML=html;
}

function selectAnswer(index){

userAnswers[current]=index;

let buttons=document.querySelectorAll("#options button");

buttons.forEach(btn=>btn.classList.remove("selected"));

buttons[index].classList.add("selected");
}

function finishQuiz(){

let score=0;

for(let i=0;i<questions.length;i++){

if(userAnswers[i]===questions[i].answer){
score++;
}

}

localStorage.setItem("score",score);
localStorage.setItem("total",questions.length);

window.location="result.html";
}

function nextQuestion(){

current++;

if(current>=questions.length){
finishQuiz();
return;
}

loadQuestion();
}

let time=60;

setInterval(()=>{

time--;

document.getElementById("timer").innerHTML=
"⏱️ "+time;

if(time<=0){
finishQuiz();
}

},1000);

</script>

</body>
</html>
