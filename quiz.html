<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>
</head>
<body>

<h1>🚂 RRB Group D Test</h1>

<h2 id="timer">60</h2>

<p>भारत की राजधानी क्या है?</p>

<button onclick="check('A')">मुंबई</button><br><br>
<button onclick="check('B')">दिल्ली</button><br><br>
<button onclick="check('C')">जयपुर</button><br><br>
<button onclick="check('D')">कोलकाता</button>

<script>

let score = 0;

function check(ans){

if(ans=="B"){
score++;
}

localStorage.setItem("score",score);

window.location="result.html";
}

let time = 60;

setInterval(function(){

time--;

document.getElementById("timer").innerHTML =
"⏱️ " + time;

if(time<=0){

localStorage.setItem("score",score);

window.location="result.html";
}

},1000);

</script>

</body>
</html>
